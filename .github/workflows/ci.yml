name: ci
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 6 * * *'  # daily, SLA-bearing — see spec "Advisory triage"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      - run: |
          set -euo pipefail
          uv venv --allow-existing
          uv pip install -e '.[dev,test]'
          uv run pre-commit run --all-files --show-diff-on-failure

  tests:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      - run: |
          set -euo pipefail
          uv venv --allow-existing --python ${{ matrix.python-version }}
          uv pip install -e '.[dev,test]'
          uv run python -m pytest \
            --cov=src/linux_debug_mcp \
            --cov-report=xml \
            --cov-report=term \
            --cov-fail-under=77
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      - run: |
          set -euo pipefail
          uv venv --allow-existing
          uv pip install -e '.[dev,test]'
          # Capture ty's exit status without aborting the block, so the closing code
          # fence still writes to the step summary on failure; then propagate the
          # status as the step's exit code to fail the (now hard-gating) job.
          status=0
          {
            echo '## ty check'
            echo
            echo '```'
            uv run ty check src 2>&1 || status=$?
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

  docs:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y --no-install-recommends ripgrep just
          just check-docs

  ipmi-policy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y --no-install-recommends ripgrep just
          just check-ipmi

  workflow-hygiene:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      - run: uv run --with 'zizmor==1.25.2' zizmor .github/workflows

  supply-chain-runtime:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      - run: |
          set -euo pipefail
          uv export --no-emit-project --no-dev --no-default-groups --format requirements-txt > /tmp/runtime-reqs.txt
          uv run --with 'pip-audit==2.10.0' pip-audit --strict -r /tmp/runtime-reqs.txt

  supply-chain-dev:
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      - run: |
          set -euo pipefail
          uv export --no-emit-project --extra dev --extra test --format requirements-txt > /tmp/dev-reqs.txt
          uv run --with 'pip-audit==2.10.0' pip-audit --strict -r /tmp/dev-reqs.txt

  package-smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      - run: |
          set -euo pipefail
          uv build
          uv venv
          uv pip install dist/*.whl
          # stdio server: succeeds, then we kill it on the 2s timeout.
          timeout 2 .venv/bin/linux-debug-mcp || test $? -eq 124
